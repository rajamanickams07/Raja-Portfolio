<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JS Tutorial</title>
</head>
<body>
    <div id="mainDiv">
        <input type="text" id="value" />
        <button onclick="getInput()">Get Input</button>

        <h1 id="Display"></h1>

        <button onclick="colorChange('blue')">Change to blue</button>
        <button onclick="colorChange('pink')">Change to pink</button>
    </div>
</body>
<script>
    function getInput()
    {
        var userInput = document.getElementById('value').value;
        
        document.getElementById('Display').innerHTML = userInput;
        alert(userInput);
    }

    function colorChange(value)
    {
        document.getElementById('mainDiv').style.backgroundColor= value;
    }
</script>
</html>
